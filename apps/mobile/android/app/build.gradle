plugins {
    id("com.android.application")
    id("com.facebook.react")
}

def enableHermes = true
def releaseSigningProperties = [
    "MYAPP_RELEASE_STORE_FILE",
    "MYAPP_RELEASE_STORE_PASSWORD",
    "MYAPP_RELEASE_KEY_ALIAS",
    "MYAPP_RELEASE_KEY_PASSWORD"
]
def hasReleaseSigning = releaseSigningProperties.every { project.hasProperty(it) && project.property(it) }

react {
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    debuggableVariants = []
    hermesEnabled = enableHermes
}

android {
    namespace "com.educonnect.app"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.educonnect.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        manifestPlaceholders = [usesCleartextTraffic: "true"]
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(MYAPP_RELEASE_STORE_FILE)
                storePassword MYAPP_RELEASE_STORE_PASSWORD
                keyAlias MYAPP_RELEASE_KEY_ALIAS
                keyPassword MYAPP_RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            manifestPlaceholders = [usesCleartextTraffic: "false"]
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (enableHermes) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation("org.webkit:android-jsc:+")
    }
}

def googleServicesFile = file("google-services.json")
if (googleServicesFile.exists()) {
    apply plugin: "com.google.gms.google-services"
}

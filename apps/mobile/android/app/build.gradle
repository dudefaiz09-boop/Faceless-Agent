plugins {
    id("com.android.application")
    id("com.facebook.react")
    id("com.google.gms.google-services")
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, it is all handled by the CLI.
 */
react {
    /* Folders */
    // The root of the React Native mobile app, where apps/mobile/package.json lives.
    root = file("../../")

    // pnpm installs the mobile app's direct React Native dependencies under apps/mobile/node_modules.
    // Do not point these at the repository root node_modules, because CI may not hoist react-native there.
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")

    // Trigger autolinking
    autolinkLibrariesWithApp()

    hermesEnabled = true
}

android {
    namespace "com.educonnect.app"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.educonnect.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                storeFile file(MYAPP_RELEASE_STORE_FILE)
                storePassword MYAPP_RELEASE_STORE_PASSWORD
                keyAlias MYAPP_RELEASE_KEY_ALIAS
                keyPassword MYAPP_RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // Check both local and root node_modules for monorepo compatibility
    def gradlePluginPath = "../node_modules/@react-native/gradle-plugin"
    if (!file(gradlePluginPath).exists()) {
        gradlePluginPath = "../../../node_modules/@react-native/gradle-plugin"
    }
    includeBuild(gradlePluginPath)
}
plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) {
    it.autolinkLibrariesFromCommand()
}

rootProject.name = 'EduConnect'
include ':app'

name: Seed Supabase Demo Data

on:
  workflow_dispatch:
    inputs:
      school_id:
        description: Supabase school/tenant id to seed
        required: false
        default: default-school
      dry_run:
        description: Preview users without writing to Supabase
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Seed Supabase
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            corepack pnpm seed:supabase -- --dry-run
          else
            corepack pnpm seed:supabase
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEED_SCHOOL_ID: ${{ inputs.school_id }}

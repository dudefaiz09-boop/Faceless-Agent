name: EduConnect Monorepo CI/CD

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- Backend & Website Job ---
  backend-deploy:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2.1.3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2.1.1

      - name: Create Firebase Config
        run: |
          echo '${{ secrets.FIREBASE_APPLET_CONFIG }}' > firebase-applet-config.json

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Run Linting
        run: npm run lint

      - name: Seed Database
        run: npm run seed
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Run Smoke Tests
        run: |
          # Start server in background (port 8080 as per Dockerfile/server.ts)
          npm start &
          
          # Wait for server to be ready
          MAX_RETRIES=30
          COUNT=0
          until $(curl -sSf http://localhost:8080/api/health > /dev/null); do
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Server failed to start"
              exit 1
            fi
            echo "Waiting for server... ($COUNT)"
            sleep 2
            COUNT=$((COUNT+1))
          done
          
          echo "Server is up! Running smoke tests..."
          bash smoke-test.sh

          # Cleanup
          kill $(jobs -p) || true
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORT: 8080

      - name: Build & Deploy to Cloud Run
        run: |
          gcloud run deploy educonnect-app \
            --source . \
            --project ${{ secrets.GCP_PROJECT }} \
            --region us-central1 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }},FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }},DB_URL=${{ secrets.DB_URL }},NODE_ENV=production \
            --allow-unauthenticated \
            --quiet

  # --- Mobile (React Native) Job ---
  mobile-distribute:
    needs: backend-deploy
    if: always() && needs.backend-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Google Services JSON
        run: |
          mkdir -p mobile/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile/android/app/google-services.json

      - name: Install Mobile Dependencies
        run: |
          cd mobile && npm install

      - name: Build Android APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v2.6.4
        with:
          args: appdistribution:distribute mobile/android/app/build/outputs/apk/release/app-release.apk --app ${{ secrets.FIREBASE_APP_ID_ANDROID }} --groups testers
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}


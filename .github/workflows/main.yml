name: EduConnect Monorepo CI/CD

on:
  push:
    branches: [ main ]

jobs:
  # --- Backend & Website Job ---
  backend-deploy:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    # Trigger only if files OUTSIDE the mobile folder change
    # Note: GitHub Actions paths work best for PRs or push. 
    # For concurrent jobs in a monorepo, we use 'paths-ignore'.
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'EduConnect-App/package-lock.json'

      - name: Install Dependencies
        run: cd EduConnect-App && npm install

      - name: Run Linting
        run: cd EduConnect-App && npm run lint

      - name: Run Smoke Tests
        run: cd EduConnect-App && bash smoke-test.sh

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Build & Deploy to Cloud Run
        run: |
          cd EduConnect-App
          gcloud run deploy educonnect-app \
            --source . \
            --project ${{ secrets.GCP_PROJECT }} \
            --region us-central1 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --allow-unauthenticated \
            --quiet

  # --- Mobile (React Native) Job ---
  mobile-distribute:
    if: "contains(github.event.head_commit.modified, 'mobile/')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'EduConnect-App/mobile/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Mobile Dependencies
        run: |
          if [ -d "EduConnect-App/mobile" ]; then
            cd EduConnect-App/mobile && npm install
          else
            echo "Mobile directory not found. Skipping build."
            exit 0
          fi

      - name: Run Mobile Tests
        run: |
          if [ -d "EduConnect-App/mobile" ]; then
            cd EduConnect-App/mobile && npm test || echo "No tests defined yet"
          fi

      - name: Build Android APK
        run: |
          if [ -d "EduConnect-App/mobile/android" ]; then
            cd EduConnect-App/mobile/android && ./gradlew assembleRelease
          fi

      - name: Upload to Firebase App Distribution
        if: success()
        run: |
          if [ -f "EduConnect-App/mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            npm install -g firebase-tools
            firebase appdistribution:distribute \
              EduConnect-App/mobile/android/app/build/outputs/apk/release/app-release.apk \
              --app ${{ secrets.FIREBASE_APP_ID }} \
              --groups testers \
              --token ${{ secrets.FIREBASE_TOKEN }}
          fi

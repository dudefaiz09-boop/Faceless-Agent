name: Enterprise Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: "gen-lang-client-0979500227"
  REGION: "us-central1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # --- Stage 1: Continuous Integration ---
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Turbo Lint
        run: pnpm turbo lint

      - name: Turbo Build
        run: pnpm turbo build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyAMBaqtdxkZ1MUKwLrA7k_JzDA4eLwPpxQ"
          VITE_FIREBASE_PROJECT_ID: "gen-lang-client-0979500227"
          VITE_FIREBASE_AUTH_DOMAIN: "gen-lang-client-0979500227.firebaseapp.com"
          VITE_FIREBASE_STORAGE_BUCKET: "gen-lang-client-0979500227.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "902823826580"
          VITE_FIREBASE_APP_ID: "1:902823826580:web:7ceea548ed1fd62252d081"

      - name: Turbo Test
        run: pnpm turbo test

  # --- Stage 2: Continuous Deployment (Main Branch Only) ---
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Install dependencies
        run: pnpm install

      - name: Deploy to Firebase
        run: |
          pnpm exec firebase deploy --project production --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
        # Alternative: use WIF auth instead of token

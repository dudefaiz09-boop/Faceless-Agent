name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'apps/functions/**'
      - 'packages/**'
      - '.github/workflows/android-distribute.yml'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Android public env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || vars.API_BASE_URL }}
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_ANON_KEY API_BASE_URL; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::$name is required for the Android APK artifact"
              missing=1
            fi
          done

          case "$API_BASE_URL" in
            http://localhost*|http://127.*|http://10.0.2.2*)
              echo "::error::API_BASE_URL must not be a localhost URL for the APK artifact"
              missing=1
              ;;
            https://*) ;;
            *)
              echo "::error::API_BASE_URL must be an HTTPS URL for the APK artifact"
              missing=1
              ;;
          esac

          case "$SUPABASE_URL" in
            https://*) ;;
            *)
              echo "::error::SUPABASE_URL must be an HTTPS URL"
              missing=1
              ;;
          esac

          if echo "$SUPABASE_ANON_KEY" | grep -Eiq 'service[_-]?role'; then
            echo "::error::SUPABASE_ANON_KEY appears to contain a service role key marker"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Lint mobile
        run: pnpm --filter mobile lint

      - name: Build Android (Debug)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || vars.API_BASE_URL }}
        run: pnpm --filter mobile build:android

      - name: Verify Android debug APK contents
        run: pnpm --filter mobile verify:android-apk

      - name: Build Android (Release APK/AAB)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || vars.API_BASE_URL }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ORG_GRADLE_PROJECT_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/release.keystore
            export ORG_GRADLE_PROJECT_ANDROID_KEYSTORE_FILE=release.keystore
          fi
          pnpm --filter mobile build:android:release

      - name: Upload APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload release AAB to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

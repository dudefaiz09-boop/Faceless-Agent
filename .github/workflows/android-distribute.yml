name: Android Distribute

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Google Services JSON
        run: |
          mkdir -p apps/mobile/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > apps/mobile/android/app/google-services.json

      - name: Install dependencies
        run: pnpm install

      - name: Build with Gradle
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: upload artifact to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute apps/mobile/android/app/build/outputs/apk/release/app-release.apk --app ${{ secrets.FIREBASE_APP_ID_ANDROID }} --groups "testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

name: Build API

on:
  push:
    branches: [main]
    paths:
      - 'apps/functions/**'
      - 'packages/**'
      - '.github/workflows/deploy-functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/functions/**'
      - 'packages/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API bundle
        run: pnpm turbo build --filter @educonnect/functions

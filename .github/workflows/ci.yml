name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - '.github/workflows/android-distribute.yml'

  web-api-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Format check
        run: corepack pnpm format:check
      - name: Lint
        run: corepack pnpm lint
      - name: Test
        run: corepack pnpm test
      - name: Build API
        run: corepack pnpm --filter @educonnect/functions build
      - name: Build Web
        run: corepack pnpm --filter @educonnect/web build

  android-build:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.mobile == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Mobile tests
        run: corepack pnpm --filter mobile test
      - name: Mobile lint
        run: corepack pnpm --filter mobile lint
      - name: Android build (Debug)
        run: corepack pnpm --filter mobile build:android

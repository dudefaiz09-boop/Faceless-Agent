name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - '.github/workflows/android-distribute.yml'

  web-api-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build shared
        run: pnpm turbo build --filter @educonnect/shared
      - name: Build shared-api
        run: pnpm turbo build --filter @educonnect/shared-api
      - name: Build shared-education
        run: pnpm turbo build --filter @educonnect/shared-education
      - name: Build API
        run: pnpm turbo build --filter @educonnect/functions
      - name: Build Web
        run: pnpm turbo build --filter @educonnect/web

  android-build:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.mobile == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Mobile tests
        run: pnpm --filter mobile test
      - name: Mobile lint
        run: pnpm --filter mobile lint
      - name: Android build (Debug)
        run: pnpm --filter mobile build:android
